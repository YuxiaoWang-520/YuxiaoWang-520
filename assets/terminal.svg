<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 716 746" width="716" height="746" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="8" y="6" width="700" height="734" rx="14" fill="#1a1b26" stroke="#2a2e42" stroke-width="1" filter="url(#shadow)"/>
  <!-- title bar -->
  <path d="M8 20 a14 14 0 0 1 14 -14 H694 a14 14 0 0 1 14 14 V40 H8 Z" fill="#15151f"/>
  <line x1="8" y1="40" x2="708" y2="40" stroke="#2a2e42" stroke-width="1"/>
  <circle cx="30" cy="23" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="23" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="23" r="6" fill="#27c93f"/>
  <text x="358" y="27" text-anchor="middle" font-size="13" fill="#565f89">yuxiao@dev — zsh</text>

  <g font-size="15">
    <!-- whoami -->
    <text x="26" y="74"><tspan fill="#7aa2f7">yuxiao@dev</tspan><tspan fill="#565f89"> ~ %</tspan><tspan fill="#bb9af7"> whoami</tspan></text>
    <text x="26" y="100"><tspan fill="#c0caf5">Yuxiao Wang</tspan><tspan fill="#565f89">  ·  </tspan><tspan fill="#c0caf5">AI Infrastructure Engineer</tspan><tspan fill="#565f89"> @ </tspan><tspan fill="#c0caf5">Alibaba Group</tspan></text>
    <text x="26" y="126" fill="#565f89" font-style="italic"># building agents that write the infra — so the infra writes itself</text>

    <!-- focus -->
    <text x="26" y="178"><tspan fill="#7aa2f7">yuxiao@dev</tspan><tspan fill="#565f89"> ~ %</tspan><tspan fill="#bb9af7"> cat</tspan><tspan fill="#c0caf5"> focus.md</tspan></text>
    <text x="26" y="204"><tspan fill="#7dcfff">kernel-gen agents</tspan><tspan fill="#565f89">   — </tspan><tspan fill="#c0caf5">LLMs that auto-write &amp; tune GPU operators</tspan></text>
    <text x="224" y="230" fill="#565f89">across CUDA · Triton · CUTLASS</text>
    <text x="26" y="256"><tspan fill="#7dcfff">agent harness arch</tspan><tspan fill="#565f89">  — </tspan><tspan fill="#c0caf5">context · memory · multi-agent · long-horizon</tspan></text>
    <text x="224" y="282"><tspan fill="#565f89">↳ </tspan><tspan fill="#7dcfff">harness-craft</tspan></text>

    <!-- foundation tree -->
    <text x="26" y="334"><tspan fill="#7aa2f7">yuxiao@dev</tspan><tspan fill="#565f89"> ~ %</tspan><tspan fill="#bb9af7"> tree</tspan><tspan fill="#c0caf5"> foundation/</tspan></text>
    <text x="26" y="360" fill="#7aa2f7">foundation/</text>
    <text x="26" y="386"><tspan fill="#565f89">├── </tspan><tspan fill="#7aa2f7">training-inference/</tspan><tspan x="248" fill="#9aa5ce">Megatron-LM · vLLM · SGLang · RTP-LLM</tspan></text>
    <text x="26" y="412"><tspan fill="#565f89">├── </tspan><tspan fill="#7aa2f7">parallelism/</tspan><tspan x="248" fill="#9aa5ce">TP · PP · EP · DP · DualPipe · EPLB</tspan></text>
    <text x="26" y="438"><tspan fill="#565f89">├── </tspan><tspan fill="#7aa2f7">gpu-kernels/</tspan><tspan x="248" fill="#9aa5ce">CUDA · Triton · CUTLASS/CuTe · FlashAttention</tspan></text>
    <text x="26" y="464"><tspan fill="#565f89">├── </tspan><tspan fill="#7aa2f7">scheduling/</tspan><tspan x="248" fill="#9aa5ce">Ray · Kubernetes · KubeDL · KubeRay</tspan></text>
    <text x="26" y="490"><tspan fill="#565f89">└── </tspan><tspan fill="#7aa2f7">post-training-rl/</tspan><tspan x="248" fill="#9aa5ce">OpenRLHF · verl · ROLL</tspan></text>

    <!-- life goal -->
    <text x="26" y="542"><tspan fill="#7aa2f7">yuxiao@dev</tspan><tspan fill="#565f89"> ~ %</tspan><tspan fill="#bb9af7"> ./life-goal</tspan><tspan fill="#c0caf5"> --status</tspan></text>
    <text x="26" y="568"><tspan fill="#565f89">[1]</tspan><tspan fill="#c0caf5"> agent writes GPU kernels </tspan><tspan fill="#414868">............</tspan><tspan fill="#9ece6a"> done</tspan></text>
    <text x="26" y="594"><tspan fill="#565f89">[2]</tspan><tspan fill="#c0caf5"> agent harness does the rest </tspan><tspan fill="#414868">.........</tspan><tspan fill="#e0af68"> wip</tspan></text>
    <text x="26" y="620"><tspan fill="#565f89">[3]</tspan><tspan fill="#565f89" font-style="italic"> # TODO: the part that makes me rich</tspan></text>
    <text x="26" y="646"><tspan fill="#565f89">[4]</tspan><tspan fill="#c0caf5"> profit</tspan></text>

    <!-- contact -->
    <text x="26" y="698"><tspan fill="#7aa2f7">yuxiao@dev</tspan><tspan fill="#565f89"> ~ %</tspan><tspan fill="#bb9af7"> cat</tspan><tspan fill="#c0caf5"> contact.txt</tspan></text>
    <text x="26" y="724"><tspan fill="#7dcfff">WeChat</tspan><tspan fill="#c0caf5">   wwyx_520</tspan></text>
    <rect x="184" y="712" width="9" height="15" fill="#9ece6a">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
